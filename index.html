<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>cfgarchive — CFGFactory Archive</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/fuse.js@7/dist/fuse.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0c0f0c;--bg2:#111511;--bg3:#161d16;
  --text:#d4ddd4;--text2:#8fa08f;--muted:#4a5c4a;
  --border:rgba(255,255,255,.07);--r:8px;--r-lg:12px;
  --game-accent:#3dba6f;--game-glow:rgba(61,186,111,.11);--game-border:rgba(61,186,111,.22);
}
body[data-game="COD4"]{--game-accent:#3dba6f;--game-glow:rgba(61,186,111,.11);--game-border:rgba(61,186,111,.22)}
body[data-game="GTA4"]{--game-accent:#f97316;--game-glow:rgba(249,115,22,.11);--game-border:rgba(249,115,22,.24)}
body[data-game="COD2"]{--game-accent:#e8c84a;--game-glow:rgba(232,200,74,.1);--game-border:rgba(232,200,74,.22)}
body[data-game="MW2"]{--game-accent:#d4af37;--game-glow:rgba(212,175,55,.1);--game-border:rgba(212,175,55,.22)}
body[data-game="WAW"]{--game-accent:#67e8f9;--game-glow:rgba(103,232,249,.11);--game-border:rgba(103,232,249,.24)}
body[data-game="BO2"]{--game-accent:#e05b6a;--game-glow:rgba(224,91,106,.1);--game-border:rgba(224,91,106,.22)}
body[data-game="MW3"]{--game-accent:#22c55e;--game-glow:rgba(34,197,94,.11);--game-border:rgba(34,197,94,.22)}
body[data-game="BF2"]{--game-accent:#fb923c;--game-glow:rgba(251,146,60,.11);--game-border:rgba(251,146,60,.24)}
body[data-game="BO"]{--game-accent:#ef4444;--game-glow:rgba(239,68,68,.1);--game-border:rgba(239,68,68,.22)}
body[data-game="CSS"]{--game-accent:#10b981;--game-glow:rgba(16,185,129,.1);--game-border:rgba(16,185,129,.22)}
body[data-game="CSGO"]{--game-accent:#38bdf8;--game-glow:rgba(56,189,248,.1);--game-border:rgba(56,189,248,.22)}
body[data-game="FS"]{--game-accent:#7ecf4a;--game-glow:rgba(126,207,74,.1);--game-border:rgba(126,207,74,.22)}
body[data-game="CF"]{--game-accent:#f97316;--game-glow:rgba(249,115,22,.11);--game-border:rgba(249,115,22,.24)}
html{zoom:1.2}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px}
#app{display:grid;grid-template-columns:192px 1fr;grid-template-rows:52px 1fr;height:100%}

/* ── TOPBAR ── */
.topbar{grid-column:1/-1;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:0}
.logo{font-family:'DM Mono',monospace;font-size:14px;font-weight:500;color:var(--text);display:flex;align-items:center;gap:8px;cursor:pointer;user-select:none;flex-shrink:0;padding-right:16px}
.logo-mark{width:22px;height:22px;border-radius:6px;background:var(--game-accent);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .3s}
.logo-mark svg{width:12px;height:12px;fill:var(--bg)}
.topbar-centre{flex:1;display:flex;justify-content:center;align-items:center;min-width:0;padding:0 12px}
.topbar-search{position:relative;width:100%;max-width:400px;min-width:120px}
.topbar-search input{width:100%;background:var(--bg3);border:1px solid var(--border);color:var(--text);font-family:'DM Sans',sans-serif;font-size:12px;padding:7px 14px 7px 30px;border-radius:20px;outline:none;transition:border-color .15s}
.topbar-search input:focus{border-color:var(--game-accent)}
.topbar-search input::placeholder{color:var(--muted)}
.search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:13px;pointer-events:none}
.topbar-right{flex-shrink:0;display:flex;align-items:center;gap:8px;padding-left:8px}
.tpill{font-size:11px;padding:3px 9px;border-radius:20px;background:rgba(255,255,255,.04);color:var(--text2);border:1px solid var(--border);font-family:'DM Mono',monospace;white-space:nowrap}
.tpill strong{color:var(--text);font-weight:500}
@media(max-width:960px){.tpill:not(:first-child){display:none}}
@media(max-width:700px){.tpill{display:none}}
.view-toggle{display:flex;gap:2px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:2px;flex-shrink:0}
.vt-btn{padding:4px 8px;border-radius:4px;cursor:pointer;border:none;background:transparent;color:var(--muted);transition:all .12s;font-size:12px}
.vt-btn.on{background:var(--bg2);color:var(--game-accent)}

/* ── LOADING ── */
#loading{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:100}
.loading-logo{font-family:'DM Mono',monospace;font-size:18px;color:var(--text);opacity:.7}
.loading-bar{width:200px;height:2px;background:var(--bg3);border-radius:2px;overflow:hidden}
.loading-fill{height:100%;background:var(--game-accent);border-radius:2px;animation:lfill 1.2s ease-in-out infinite}
@keyframes lfill{0%{width:0;margin-left:0}50%{width:60%;margin-left:20%}100%{width:0;margin-left:100%}}
.loading-msg{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace}


/* ── SIDEBAR ── */
.sidebar{background:var(--bg2);border-right:1px solid var(--border);padding:0;display:flex;flex-direction:column;overflow:hidden}
.sidebar-scroll{overflow-y:auto;flex:1;padding:8px 0}
.sidebar-scroll::-webkit-scrollbar{width:3px}
.sidebar-scroll::-webkit-scrollbar-thumb{background:var(--muted);border-radius:2px}
.sl{padding:10px 13px 4px;font-size:9px;color:var(--muted);letter-spacing:2.5px;text-transform:uppercase;font-family:'DM Mono',monospace}
.si{padding:6px 13px 6px 11px;font-size:12px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;transition:all .12s;color:var(--text);opacity:.52;border-left:2px solid transparent}
.si:hover{background:var(--game-glow);opacity:.88;border-left-color:var(--game-border)}
.si.on{color:var(--game-accent);opacity:1;background:var(--game-glow);border-left-color:var(--game-accent)}
.si-label{display:flex;align-items:center;gap:7px;min-width:0;overflow:hidden}
.si-name{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.game-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;opacity:.4;transition:opacity .12s}
.si.on .game-dot{opacity:1}
.si .badge{font-size:10px;font-family:'DM Mono',monospace;background:rgba(255,255,255,.05);color:var(--muted);padding:1px 6px;border-radius:8px;flex-shrink:0;margin-left:4px}
.si.on .badge{background:var(--game-glow);color:var(--game-accent);border:1px solid var(--game-border)}
.sidebar-footer{padding:11px 13px;border-top:1px solid var(--border);font-size:10px;color:var(--muted);line-height:1.8;font-family:'DM Mono',monospace;flex-shrink:0}
.sidebar-footer a{color:var(--muted);text-decoration:none;transition:color .12s}
.sidebar-footer a:hover{color:var(--text2)}

/* ── MAIN ── */
.main{overflow:hidden;display:flex;flex-direction:column}

/* ── CAT TABS ── */
.cat-bar{padding:0 14px;border-bottom:1px solid var(--border);background:var(--bg2);display:flex;align-items:center;flex-shrink:0;overflow-x:auto}
.cat-bar::-webkit-scrollbar{height:2px}
.cat-bar::-webkit-scrollbar-thumb{background:var(--muted)}
.cat-tab{padding:12px 12px;font-size:12px;cursor:pointer;color:var(--text2);border-bottom:2px solid transparent;white-space:nowrap;transition:all .12s;flex-shrink:0}
.cat-tab:hover{color:var(--text)}
.cat-tab.on{color:var(--game-accent);border-bottom-color:var(--game-accent)}
.cat-count{font-size:10px;font-family:'DM Mono',monospace;color:var(--muted);margin-left:4px}
.cat-tab.on .cat-count{color:var(--game-accent);opacity:.55}

/* ── TOOLBAR ── */
.grid-toolbar{padding:8px 14px;border-bottom:1px solid var(--border);display:flex;gap:8px;align-items:center;flex-shrink:0;background:var(--bg2)}
.result-count{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;white-space:nowrap;margin-right:2px}
.sort-chips{display:flex;gap:4px}
.sc{font-size:11px;padding:4px 10px;border-radius:6px;border:1px solid var(--border);color:var(--muted);cursor:pointer;transition:all .12s;white-space:nowrap}
.sc:hover,.sc.on{border-color:var(--game-accent);color:var(--game-accent);background:var(--game-glow)}

/* ── TAG BAR ── */
.tag-bar{padding:6px 14px;border-bottom:1px solid var(--border);background:var(--bg);display:flex;align-items:center;gap:5px;flex-shrink:0;overflow-x:auto;min-height:36px}
.tag-bar::-webkit-scrollbar{height:2px}
.tag-bar::-webkit-scrollbar-thumb{background:var(--muted)}
.tb-label{font-size:9px;color:var(--muted);white-space:nowrap;font-family:'DM Mono',monospace;flex-shrink:0;letter-spacing:1.5px;text-transform:uppercase}
.tag-pill{font-size:11px;padding:2px 9px;border-radius:20px;cursor:pointer;white-space:nowrap;border:1px solid var(--border);color:var(--text2);background:transparent;transition:all .12s;flex-shrink:0}
.tag-pill:hover{border-color:var(--game-border);color:var(--game-accent);background:var(--game-glow)}
.tag-pill.on{border-color:var(--game-accent);color:var(--bg);background:var(--game-accent)}
.tag-pill .tc{opacity:.45;font-size:9px;margin-left:3px}
.tag-clear{font-size:10px;color:var(--muted);cursor:pointer;padding:2px 8px;border-radius:20px;border:1px solid var(--border);white-space:nowrap;flex-shrink:0;transition:all .12s;display:none}
.tag-clear:hover{color:var(--text);border-color:rgba(255,255,255,.15)}
.tag-clear.show{display:block}

/* ── GRID ── */
.grid-scroll{overflow-y:auto;flex:1;padding:14px}
.grid-scroll::-webkit-scrollbar{width:4px}
.grid-scroll::-webkit-scrollbar-thumb{background:var(--muted);border-radius:2px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:10px}
.list-mode .grid{grid-template-columns:1fr;gap:3px}
.list-mode .card{display:grid;grid-template-columns:78px 1fr auto;border-radius:var(--r);align-items:center;transform:none!important}
.list-mode .card-img{height:54px}
.list-mode .card-body{padding:0 12px;display:flex;align-items:center;gap:14px}
.list-mode .card-title{-webkit-line-clamp:1;flex:1;margin-bottom:0}
.list-mode .card-author{min-width:80px;margin-bottom:0}
.list-mode .card-footer{padding:0 12px;min-width:100px;justify-content:flex-end;gap:10px}
.list-mode .card-overlay,.list-mode .card-tags{display:none}

/* ── PAGINATION ── */
.pagination{display:flex;align-items:center;justify-content:center;gap:4px;padding:14px 14px 6px;flex-wrap:wrap}
.pg-btn{background:var(--bg2);border:1px solid var(--border);color:var(--muted);border-radius:var(--r);padding:5px 10px;font-size:11px;cursor:pointer;transition:all .12s;font-family:'DM Mono',monospace;min-width:32px;text-align:center}
.pg-btn:hover:not([disabled]){border-color:var(--game-border);color:var(--text)}
.pg-btn.on{border-color:var(--game-accent);color:var(--game-accent);font-weight:600}
.pg-btn[disabled]{opacity:.3;cursor:default}
.pg-gap{color:var(--muted);font-size:11px;padding:0 2px;font-family:'DM Mono',monospace}

/* ── CARD ── */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;cursor:pointer;transition:transform .18s,border-color .18s}
.card:hover{transform:translateY(-2px);border-color:var(--game-border)}
.card-img{height:92px;background:var(--bg3);position:relative;overflow:hidden}
.card-img img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .3s}
.card:hover .card-img img{transform:scale(1.05)}
.card-img-ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;font-family:'DM Mono',monospace}
.card-overlay{position:absolute;bottom:0;left:0;right:0;display:flex;justify-content:space-between;padding:5px 6px}
.card-cat-tag{font-size:9px;font-family:'DM Mono',monospace;padding:2px 6px;border-radius:3px;background:rgba(0,0,0,.82);color:var(--game-accent);letter-spacing:.4px}
.card-ext-tag{font-size:9px;font-family:'DM Mono',monospace;padding:2px 5px;border-radius:3px;background:rgba(0,0,0,.75);color:var(--text2)}
.card-body{padding:8px 10px}
.card-title{font-size:12px;font-weight:500;line-height:1.35;margin-bottom:2px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.card-author{font-size:10px;color:var(--text2);margin-bottom:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-footer{display:flex;justify-content:space-between;align-items:center}
.card-dl{font-size:10px;color:var(--muted);font-family:'DM Mono',monospace}
.card-r{font-size:10px;font-family:'DM Mono',monospace;color:var(--game-accent)}
.card-tags{display:flex;gap:3px;flex-wrap:wrap;margin-top:5px}
.ctag{font-size:9px;color:var(--muted);border:1px solid rgba(255,255,255,.07);padding:1px 5px;border-radius:3px;cursor:pointer;transition:all .1s}
.ctag:hover{color:var(--game-accent);border-color:var(--game-border)}
.ctag.active{color:var(--game-accent);border-color:var(--game-accent);background:var(--game-glow)}

/* ── ENTRY PAGE ── */
/* view-entry is fixed-position overlay — see inline style in HTML */
#view-entry::-webkit-scrollbar{width:4px}
#view-entry::-webkit-scrollbar-thumb{background:var(--muted);border-radius:2px}
.entry-page{max-width:860px;margin:0 auto;padding:20px 20px 48px;width:100%}
.entry-back{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--text2);cursor:pointer;margin-bottom:18px;padding:5px 0;transition:color .12s;border:none;background:none}
.entry-back:hover{color:var(--game-accent)}
.entry-back svg{width:14px;height:14px;stroke:currentColor;fill:none}
.carousel{position:relative;border-radius:var(--r-lg);overflow:hidden;background:var(--bg3);margin-bottom:22px;border:1px solid var(--border);aspect-ratio:16/9}
.c-track{position:relative;height:100%}
.c-slide{position:absolute;inset:0;display:none;opacity:0;transition:opacity .25s}
.c-slide.active{display:block;opacity:1}
.c-slide img{width:100%;height:100%;object-fit:contain;display:block;background:var(--bg3)}
.c-ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:1px}
.c-btn{position:absolute;top:50%;transform:translateY(-50%);width:32px;height:32px;border-radius:50%;background:rgba(0,0,0,.72);border:1px solid rgba(255,255,255,.13);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s;z-index:2}
.c-btn:hover{background:rgba(0,0,0,.92)}
.c-btn.prev{left:10px}.c-btn.next{right:10px}
.c-btn svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2.5}
.c-dots{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);display:flex;gap:5px;z-index:2}
.c-dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.3);cursor:pointer;transition:all .15s}
.c-dot.on{background:var(--game-accent);transform:scale(1.2)}
.c-count{position:absolute;top:10px;right:12px;font-size:10px;font-family:'DM Mono',monospace;background:rgba(0,0,0,.7);color:rgba(255,255,255,.6);padding:2px 8px;border-radius:10px;z-index:2}
.entry-top{display:grid;grid-template-columns:1fr auto;gap:20px;align-items:start;margin-bottom:16px}
.entry-badge{display:inline-flex;align-items:center;gap:6px;font-size:10px;font-family:'DM Mono',monospace;color:var(--game-accent);background:var(--game-glow);border:1px solid var(--game-border);padding:3px 10px;border-radius:20px;margin-bottom:8px}
.entry-title{font-size:22px;font-weight:600;line-height:1.2;margin-bottom:6px}
.entry-byline{font-size:13px;color:var(--text2)}
.entry-byline strong{color:var(--text);font-weight:500}
.entry-actions{display:flex;flex-direction:column;gap:7px;flex-shrink:0;min-width:148px}
.btn-dl{display:inline-flex;align-items:center;justify-content:center;gap:8px;background:var(--game-accent);color:var(--bg);padding:10px 18px;border-radius:var(--r);font-size:13px;font-weight:600;text-decoration:none;transition:opacity .15s;border:none;cursor:pointer;white-space:nowrap;font-family:'DM Sans',sans-serif}
.btn-dl:hover{opacity:.88}
.btn-dl svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2.5}
.no-file-note{font-size:11px;color:var(--muted);text-align:center;padding:9px;background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:var(--r)}
.btn-report{display:inline-flex;align-items:center;justify-content:center;gap:6px;background:transparent;color:var(--muted);padding:7px 12px;border-radius:var(--r);font-size:11px;text-decoration:none;border:1px solid var(--border);transition:all .15s;cursor:pointer;white-space:nowrap;font-family:'DM Sans',sans-serif;width:100%}
.btn-report:hover{color:var(--text2);border-color:rgba(255,255,255,.15)}
.btn-report svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2;flex-shrink:0}
.entry-tags{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px}
.etag{font-size:11px;color:var(--text2);background:rgba(255,255,255,.05);border:1px solid var(--border);padding:3px 9px;border-radius:5px;cursor:pointer;transition:all .12s}
.etag:hover{color:var(--game-accent);border-color:var(--game-border);background:var(--game-glow)}
.etag.active{color:var(--game-accent);border-color:var(--game-accent);background:var(--game-glow)}
.entry-body{display:grid;grid-template-columns:1fr 248px;gap:18px}
.stats-section{margin-bottom:16px}
.stats-hdr{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.stats-hdr h3{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:2px;font-family:'DM Mono',monospace;white-space:nowrap}
.stats-div{flex:1;height:1px;background:var(--border)}
.stats-note{font-size:9px;color:var(--muted);font-family:'DM Mono',monospace;padding:2px 8px;border-radius:10px;border:1px solid var(--border);white-space:nowrap}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.stat{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:10px 12px}
.stat-l{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;font-family:'DM Mono',monospace;margin-bottom:3px}
.stat-v{font-size:19px;font-weight:600;font-family:'DM Mono',monospace;color:var(--text)}
.stat-v.accent{color:var(--game-accent)}
.stat.live{border-color:var(--game-border)}
.stat.live .stat-l::after{content:' · live';color:var(--game-accent)}
.snap-note{font-size:11px;color:var(--muted);padding:8px 12px;background:rgba(255,255,255,.03);border-left:2px solid var(--game-accent);border-radius:0 var(--r) var(--r) 0;margin-bottom:14px;line-height:1.6}
.snap-note strong{color:var(--text2)}
.desc-box{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:13px 15px;margin-bottom:14px}
.desc-box h3{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:2px;font-family:'DM Mono',monospace;margin-bottom:8px}
.desc-box p{font-size:13px;color:var(--text2);line-height:1.7}
.meta-box{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:13px 15px}
.meta-box h3{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:2px;font-family:'DM Mono',monospace;margin-bottom:11px}
.meta-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border);font-size:12px}
.meta-row:last-child{border-bottom:none}
.meta-k{color:var(--muted)}
.meta-v{color:var(--text);font-family:'DM Mono',monospace;font-size:11px;text-align:right}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:220px;color:var(--muted);gap:8px}
.empty p{font-size:13px}
</style>
</head>
<body data-game="COD4">

<!-- Loading screen -->
<div id="loading">
  <div class="loading-logo">cfg<span style="opacity:.4">archive</span></div>
  <div class="loading-bar"><div class="loading-fill"></div></div>
  <div class="loading-msg" id="loading-msg">Loading archive…</div>
</div>
<!-- load-error removed: UI always shows, errors logged to console -->

<div id="app" style="display:none">
  <!-- TOPBAR -->
  <div class="topbar">

<script>
// ── CONFIG ────────────────────────────────────────────────────────────────────
const R2     = 'https://files.cfgarchive.net';  // public blobs (images, files)
const META   = 'https://meta.cfgarchive.net';   // Worker proxy → private cfgmeta bucket
const GITHUB = 'https://github.com/shaywiki/cfgarchive-web';

// ── PER-GAME CATEGORY TABS ────────────────────────────────────────────────────
// These are the v2 display categories shown in the tab bar per game
const GAME_CATS = {
  COD4:  ['Configs','Movie Configs','Weapon Skins','Maps','Assets','Mods & Tools','Other'],
  GTA4:  ['Vehicles','Weapons','Skins','Maps'],
  COD2:  ['Configs','Movie Configs','Weapon Skins','Maps','Mods & Tools','Other'],
  MW2:   ['Configs','Movie Configs','Weapon Skins','Maps','Assets','Mods & Tools','Other'],
  WAW:   ['Weapon Skins','Maps','Other'],
  BO2:   ['Movie Configs','Weapon Skins','Mods & Tools'],
  MW3:   ['Configs','Movie Configs','Weapon Skins','Mods & Tools','Other'],
  BF2:   ['Maps','Mods & Tools','Other'],
  BO:    ['Movie Configs','Weapon Skins','Maps','Mods & Tools','Other'],
  CSS:   ['Weapon Skins'],
  CSGO:  ['Configs','Movie Configs','Weapon Skins','Maps'],
  FS:    ['Other'],
  CF:    ['Other'],
};

// ── STATE ─────────────────────────────────────────────────────────────────────
let DATA      = [];
let TAG_FREQ  = {};
let curGame   = 'COD4';
let curCat    = 'Configs';
let sortBy    = 'dl';
let viewMode  = 'grid';
let activeTags = new Set();
let curPage = 1;
const PAGE_SIZE = 100;
let _imgs = [], _slide = 0;
let fuse = null;

// ── HELPERS ───────────────────────────────────────────────────────────────────
const safe = s => (s||'').toLowerCase().replace(/-/g,'_').replace(/[^\w\s]/g,'').trim().replace(/\s+/g,'_').slice(0,60).replace(/_$/,'')||'unknown';
const fmtN = n => n >= 1000 ? (n/1000).toFixed(1)+'K' : String(n);

function byline(e) {
  const a = (e.author||'').trim(), u = (e.uploader||'').trim();
  if (a && a.toLowerCase() !== 'n/a') return a;
  if (u && u.toLowerCase() !== 'n/a') return u;
  return 'unknown';
}

// folder() uses raw author (safe(e.author)) to match how folders were named on upload
function folder(e) {
  return `${safe(e.game_code)}.${safe(e._raw_category)}.${safe(e.title)}.${safe(e.author||'')}`;
}

// Derive image extension from local_images filenames (some entries use .png, most .jpg)
function imgExt(e) {
  if (e.local_images && e.local_images.length && typeof e.local_images[0] === 'string') {
    const ext = e.local_images[0].split('.').pop().toLowerCase();
    if (ext === 'png' || ext === 'jpg' || ext === 'jpeg') return ext;
  }
  return 'jpg';
}

// Thumbnail: image_0 from R2
function thumbUrl(e) {
  if (!e.has_image) return null;
  const f = folder(e);
  const g = safe(e.game_code);
  const c = safe(e._raw_category);
  return `${R2}/${g}/${c}/${f}/${f}_image_0.${imgExt(e)}`;
}

// Carousel: use local_images count; fallback to 4 so slideErr can prune missing ones
function imgUrls(e) {
  if (!e.has_image) return [];
  const f = folder(e);
  const g = safe(e.game_code);
  const c = safe(e._raw_category);
  const base = `${R2}/${g}/${c}/${f}/${f}_image_`;
  const ext = imgExt(e);
  const count = (e.local_images && e.local_images.length) ? e.local_images.length : 4;
  return Array.from({length: count}, (_, i) => `${base}${i}.${ext}`);
}

function fileExt(e) {
  if (e.local_file) {
    const ext = e.local_file.split('.').pop().toLowerCase();
    if (['cfg','zip','rar','7z'].includes(ext)) return ext;
  }
  return 'cfg';
}

// Download URL: use local_file filename when available (exact match), fallback to safe(title).ext
function dlUrl(e) {
  const f = folder(e);
  const g = safe(e.game_code);
  const c = safe(e._raw_category);
  const filename = e.local_file || `${safe(e.title)}.${fileExt(e)}`;
  return `${R2}/${g}/${c}/${f}/${filename}`;
}

// ── DATA LOADING ──────────────────────────────────────────────────────────────
async function safeFetch(url) {
  try {
    const res = await fetch(url);
    if (!res.ok) return null;
    return await res.json();
  } catch { return null; }
}

async function loadData() {
  const setMsg = m => { document.getElementById('loading-msg').textContent = m; };

  const showApp = () => {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('app').style.display = '';
  };

  try {
    setMsg('Fetching index…');

    // All 4 fetched in parallel from Worker proxy → private cfgmeta bucket
    // Any that fail return null — UI still loads, just empty
    const [index, catsV2, tagsV2, tagFreq] = await Promise.all([
      safeFetch(`${META}/index.json`),
      safeFetch(`${META}/categories-v2.json`),
      safeFetch(`${META}/tags-v2.json`),
      safeFetch(`${META}/tag-freq.json`),
    ]);

    if (index && index.entries) {
      setMsg('Applying categories…');
      DATA = index.entries.map(e => ({
        ...e,
        _raw_category: e.category,
        category:      (catsV2 && catsV2[e.id]) ?? e.category,
        tags:          (tagsV2 && tagsV2[e.id]) ?? (e.tags || []),
      }));
      TAG_FREQ = tagFreq || {};
      document.getElementById('pill-total').textContent = DATA.length.toLocaleString();

      setMsg('Building search index…');
      fuse = new Fuse(DATA, {
        keys: [{name:'title',weight:2},{name:'author',weight:1},{name:'tags',weight:0.8}],
        threshold: 0.35,
        ignoreLocation: true,
      });
    } else {
      // index.json not available yet — show empty UI
      console.warn('index.json not available — showing empty archive UI');
      document.getElementById('pill-total').textContent = '—';
    }

    showApp();
    buildCatBar(curGame);
    handleHash();

  } catch (err) {
    // Show UI regardless — never show dead error screen
    console.error('Load error:', err);
    showApp();
    buildCatBar(curGame);
    handleHash();
  }
}

// ── GAME / CAT ────────────────────────────────────────────────────────────────
function setGame(el, g) {
  curGame = g;
  document.body.setAttribute('data-game', g);
  document.querySelectorAll('.si[data-game]').forEach(n => n.classList.remove('on'));
  el.classList.add('on');
  activeTags.clear();
  const cats = GAME_CATS[g] || ['Other'];
  curCat = cats[0];
  buildCatBar(g);
  goHome();
}

function buildCatBar(g) {
  const cats = GAME_CATS[g] || ['Other'];
  // Count entries per v2 category for this game
  const counts = {};
  DATA.filter(e => e.game_code === g).forEach(e => {
    counts[e.category] = (counts[e.category] || 0) + 1;
  });

  document.getElementById('cat-bar').innerHTML = cats.map(c => {
    const n = counts[c] ? `<span class="cat-count">${counts[c].toLocaleString()}</span>` : '';
    return `<span class="cat-tab${curCat===c?' on':''}" onclick="setCat(this,'${c}')">${c}${n}</span>`;
  }).join('');
}

function setCat(el, c) {
  curCat = c;
  activeTags.clear();
  document.querySelectorAll('.cat-tab').forEach(t => t.classList.remove('on'));
  el.classList.add('on');
  goHome();
}

// ── SORT / VIEW ───────────────────────────────────────────────────────────────
function setSort(el, s) {
  sortBy = s;
  curPage = 1;
  document.querySelectorAll('.sc').forEach(x => x.classList.remove('on'));
  el.classList.add('on');
  render();
}

function setViewMode(m) {
  viewMode = m;
  document.getElementById('btn-grid').classList.toggle('on', m==='grid');
  document.getElementById('btn-list').classList.toggle('on', m==='list');
  document.getElementById('grid-scroll').classList.toggle('list-mode', m==='list');
  render();
}

// ── TAG BAR ───────────────────────────────────────────────────────────────────
function buildTagBar(baseItems) {
  // Build tag frequency for current view, ordered by global tag-freq.json
  const localFreq = {};
  baseItems.forEach(e => (e.tags||[]).forEach(t => {
    localFreq[t] = (localFreq[t]||0) + 1;
  }));

  // Sort by global frequency (tag-freq.json) so important tags appear first
  const sorted = Object.entries(localFreq)
    .sort((a, b) => (TAG_FREQ[b[0]]||0) - (TAG_FREQ[a[0]]||0))
    .slice(0, 28);

  const hasTags = activeTags.size > 0;
  const clearBtn = `<span class="tag-clear${hasTags?' show':''}" onclick="clearTags()">✕ clear</span>`;
  const pills = sorted.map(([t, n]) =>
    `<span class="tag-pill${activeTags.has(t)?' on':''}" onclick="toggleTag('${t}')">${t}<span class="tc">${n}</span></span>`
  ).join('');
  document.getElementById('tag-bar').innerHTML = `<span class="tb-label">Tags</span>${clearBtn}${pills}`;
}

function toggleTag(t) {
  curPage = 1;
  activeTags.has(t) ? activeTags.delete(t) : activeTags.add(t);
  render();
}

function clearTags() {
  curPage = 1;
  activeTags.clear();
  render();
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function render() {
  const q = (document.getElementById('search').value||'').trim();

  // Base: current game + current v2 category
  let baseItems = DATA.filter(e => e.game_code === curGame && e.category === curCat);

  buildTagBar(baseItems);

  // Search
  let items;
  if (q && fuse) {
    // Search across all entries in this game, then filter to current cat
    const allGame = DATA.filter(e => e.game_code === curGame);
    const tmpFuse = new Fuse(allGame, {
      keys: [{name:'title',weight:2},{name:'author',weight:1},{name:'tags',weight:0.8}],
      threshold: 0.35, ignoreLocation: true,
    });
    const ids = new Set(tmpFuse.search(q).map(r => r.item.id));
    items = baseItems.filter(e => ids.has(e.id));
  } else {
    items = [...baseItems];
  }

  // Tag filter
  if (activeTags.size) {
    items = items.filter(e => [...activeTags].every(t => (e.tags||[]).includes(t)));
  }

  // Sort
  if (sortBy === 'dl')     items.sort((a,b) => b.downloads - a.downloads);
  else if (sortBy === 'rating') items.sort((a,b) => b.rating - a.rating);
  else items.sort((a,b) => new Date(b.upload_date) - new Date(a.upload_date));

  document.getElementById('result-count').textContent =
    `${items.length.toLocaleString()} result${items.length!==1?'s':''}`;

  if (!items.length) {
    document.getElementById('grid').innerHTML =
      `<div class="empty" style="grid-column:1/-1"><p>No results${activeTags.size?' — try clearing tags':''}</p></div>`;
    document.getElementById('pagination').innerHTML = '';
    return;
  }

  const totalPages = Math.max(1, Math.ceil(items.length / PAGE_SIZE));
  if (curPage > totalPages) curPage = totalPages;
  const pageItems = items.slice((curPage - 1) * PAGE_SIZE, curPage * PAGE_SIZE);

  document.getElementById('grid').innerHTML = pageItems.map(e => {
    const thumb = thumbUrl(e);
    const imgEl = thumb
      ? `<img src="${thumb}" alt="${e.title.replace(/"/g,'')}" loading="lazy" onerror="const s=this.src;if(s.endsWith('.jpg')||s.endsWith('.jpeg')){this.onerror=function(){this.style.display='none';this.parentNode.querySelector('.card-img-ph')||this.parentNode.insertAdjacentHTML('afterbegin','<div class=card-img-ph>no image</div>')};this.src=s.replace(/\\.(jpg|jpeg)$/,'.png')}else if(s.endsWith('.png')){this.onerror=function(){this.style.display='none';this.parentNode.querySelector('.card-img-ph')||this.parentNode.insertAdjacentHTML('afterbegin','<div class=card-img-ph>no image</div>')};this.src=s.replace(/\\.png$/,'.jpg')}else{this.style.display='none';this.parentNode.querySelector('.card-img-ph')||this.parentNode.insertAdjacentHTML('afterbegin','<div class=card-img-ph>no image</div>')}">`
      : '';
    const ph = !thumb ? `<div class="card-img-ph">no image</div>` : '';
    const tagPills = (e.tags||[]).slice(0, 4).map(t =>
      `<span class="ctag${activeTags.has(t)?' active':''}" onclick="event.stopPropagation();toggleTag('${t}')">${t}</span>`
    ).join('');
    return `<div class="card" onclick="openEntry('${e.id}')">
  <div class="card-img">${ph}${imgEl}
  </div>
  <div class="card-body">
    <div class="card-title">${e.title}</div>
    <div class="card-author">by ${byline(e)}</div>
    <div class="card-footer">
      <span class="card-dl">${fmtN(e.downloads)} dl</span>
      <span class="card-r">★ ${e.rating}</span>
    </div>
    <div class="card-tags">${tagPills}</div>
  </div>
</div>`;
  }).join('');

  renderPagination(totalPages);
}

function renderPagination(totalPages) {
  const el = document.getElementById('pagination');
  if (!el || totalPages <= 1) { if (el) el.innerHTML = ''; return; }
  const spread = 2;
  const pages = [];
  for (let i = 1; i <= totalPages; i++) {
    if (i === 1 || i === totalPages || (i >= curPage - spread && i <= curPage + spread)) {
      pages.push(i);
    }
  }
  let html = `<button class="pg-btn" onclick="setPage(${curPage-1})" ${curPage===1?'disabled':''}>&#8592;</button>`;
  let prev = null;
  for (const p of pages) {
    if (prev !== null && p > prev + 1) html += `<span class="pg-gap">…</span>`;
    html += `<button class="pg-btn${p===curPage?' on':''}" onclick="setPage(${p})">${p}</button>`;
    prev = p;
  }
  html += `<button class="pg-btn" onclick="setPage(${curPage+1})" ${curPage===totalPages?'disabled':''}>&#8594;</button>`;
  el.innerHTML = html;
}

function setPage(p) {
  curPage = p;
  render();
  document.getElementById('grid-scroll').scrollTo({top: 0, behavior: 'smooth'});
}

// ── CAROUSEL ──────────────────────────────────────────────────────────────────
function buildCarousel(imgs) {
  if (!imgs.length) return `<div class="carousel"><div class="c-ph">no image archived</div></div>`;

  const slides = imgs.map((src, i) =>
    `<div class="c-slide${i===0?' active':''}">
      <img src="${src}" alt="" onerror="slideErrFallback(this)">
    </div>`
  ).join('');

  // Always render nav hidden — _carouselSync reveals once real slide count is known
  const btns = `<button class="c-btn prev" style="display:none" onclick="slideBy(-1)"><svg viewBox="0 0 24 24" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg></button>
       <button class="c-btn next" style="display:none" onclick="slideBy(1)"><svg viewBox="0 0 24 24" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg></button>`;
  const dots = `<div class="c-dots" style="display:none">${imgs.map((_,i) => `<span class="c-dot${i===0?' on':''}" onclick="slideTo(${i})"></span>`).join('')}</div>`;
  const counter = `<span class="c-count" id="c-count" style="display:none">1 / ${imgs.length}</span>`;

  return `<div class="carousel">${btns}
    <div class="c-track" id="c-track">${slides}</div>
    ${dots}${counter}
  </div>`;
}

function _carouselSync() {
  const track = document.getElementById('c-track');
  if (!track) return;
  const slides = track.querySelectorAll('.c-slide');
  const n = slides.length;
  _imgs = Array(n).fill(null);
  _slide = n > 0 ? (((_slide % n) + n) % n) : 0;
  slides.forEach((s, j) => s.classList.toggle('active', j === _slide));
  document.querySelectorAll('.c-dot').forEach((d, j) => d.classList.toggle('on', j === _slide));
  const cc = document.getElementById('c-count');
  const multi = n > 1;
  document.querySelectorAll('.c-btn').forEach(b => b.style.display = multi ? '' : 'none');
  const dotsEl = document.querySelector('.c-dots');
  if (dotsEl) dotsEl.style.display = multi ? '' : 'none';
  if (cc) {
    cc.textContent = `${_slide + 1} / ${n}`;
    cc.style.display = multi ? '' : 'none';
  }
}

function slideTo(i) {
  _slide = i;
  _carouselSync();
}
function slideBy(d) { slideTo(_slide + d); }

function slideErr(img) {
  img.closest('.c-slide').remove();
  _carouselSync();
}

function slideErrFallback(img) {
  const src = img.src;
  if (src.endsWith('.jpg') || src.endsWith('.jpeg')) {
    img.onerror = () => slideErr(img);
    img.src = src.replace(/\.(jpg|jpeg)$/, '.png');
  } else if (src.endsWith('.png')) {
    img.onerror = () => slideErr(img);
    img.src = src.replace(/\.png$/, '.jpg');
  } else {
    slideErr(img);
  }
}

// ── ENTRY PAGE ────────────────────────────────────────────────────────────────
function reportUrl(e) {
  const t = encodeURIComponent(`[REPORT] ${e.title} (${e.id})`);
  const b = encodeURIComponent(
    `**Entry ID:** ${e.id}\n**Title:** ${e.title}\n**Game:** ${e.game_code}\n**Category:** ${e._raw_category}\n\n` +
    `## Issue type\n- [ ] File missing or download broken\n- [ ] Wrong metadata\n- [ ] Image missing\n- [ ] Site bug\n- [ ] Other\n\n` +
    `## Description\n\n## Original CFGFactory URL\nhttps://cfgfactory.com/downloads/show/${e.id}\n`
  );
  return `${GITHUB}/issues/new?title=${t}&body=${b}&labels=report`;
}

function openEntry(id, push=true) {
  const e = DATA.find(x => x.id === id);
  if (!e) return;
  if (push) location.hash = 'entry/' + id;
  _slide = 0;
  _imgs  = imgUrls(e);

  const ext = fileExt(e);
  const bl  = byline(e);
  const showUploader = e.uploader && e.uploader.trim() && e.uploader !== e.author;

  document.getElementById('entry-page').innerHTML = `
    <button class="entry-back" onclick="goHome()">
      <svg viewBox="0 0 24 24" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
      Back to ${curCat}
    </button>
    ${buildCarousel(_imgs)}
    <div class="entry-top">
      <div>
        <div class="entry-badge">
          <svg viewBox="0 0 10 10" width="7" height="7" fill="currentColor"><circle cx="5" cy="5" r="4"/></svg>
          ${e.game_code} · ${e._raw_category}
        </div>
        <div class="entry-title">${e.title}</div>
        <div class="entry-byline">by <strong>${bl}</strong>&ensp;·&ensp;${e.upload_date}</div>
      </div>
      <div class="entry-actions">
        ${e.has_file
          ? `<a class="btn-dl" href="${dlUrl(e)}" target="_blank">
               <svg viewBox="0 0 24 24" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
               Download .${ext}
             </a>`
          : `<div class="no-file-note">File not in archive</div>`
        }
        <a class="btn-report" href="${reportUrl(e)}" target="_blank">
          <svg viewBox="0 0 24 24"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
          Report an issue
        </a>
      </div>
    </div>
    <div class="entry-tags">
      ${(e.tags||[]).map(t =>
        `<span class="etag${activeTags.has(t)?' active':''}" onclick="tagAndBack('${t}')">${t}</span>`
      ).join('')}
    </div>
    <div class="entry-body">
      <div>
        <div class="stats-section">
          <div class="stats-hdr">
            <h3>CFGFactory stats</h3><div class="stats-div"></div>
            <span class="stats-note">snapshot · 13 Mar 2026</span>
          </div>
          <div class="stats-grid">
            <div class="stat"><div class="stat-l">Downloads</div><div class="stat-v">${(e.downloads||0).toLocaleString()}</div></div>
            <div class="stat"><div class="stat-l">Unique</div><div class="stat-v">${(e.unique_downloads||0).toLocaleString()}</div></div>
            <div class="stat"><div class="stat-l">Rating</div><div class="stat-v accent">${e.rating||'—'}/10</div></div>
            <div class="stat"><div class="stat-l">Votes</div><div class="stat-v">${e.votes||0}</div></div>
          </div>
        </div>
        <div class="desc-box">
          <h3>Archived description</h3>
          <p>${e.description || 'No description archived.'}</p>
        </div>
      </div>
      <div>
        <div class="meta-box">
          <h3>File info</h3>
          <div class="meta-row"><span class="meta-k">Author</span><span class="meta-v">${e.author||'—'}</span></div>
          ${showUploader ? `<div class="meta-row"><span class="meta-k">Uploader</span><span class="meta-v">${e.uploader}</span></div>` : ''}
          <div class="meta-row"><span class="meta-k">Uploaded</span><span class="meta-v">${e.upload_date||'—'}</span></div>
          <div class="meta-row"><span class="meta-k">File size</span><span class="meta-v">${e.file_size||'—'}</span></div>
          <div class="meta-row"><span class="meta-k">Format</span><span class="meta-v">.${ext}</span></div>
          <div class="meta-row"><span class="meta-k">Original category</span><span class="meta-v">${e._raw_category}</span></div>
          <div class="meta-row"><span class="meta-k">Images</span><span class="meta-v">${_imgs.length}</span></div>
          <div class="meta-row"><span class="meta-k">Archive ID</span><span class="meta-v" style="font-size:10px;word-break:break-all">${e.id}</span></div>
        </div>
      </div>
    </div>`;

  const ev = document.getElementById('view-entry');
  ev.style.display = 'flex';
  ev.scrollTop = 0;
}

function tagAndBack(t) {
  activeTags.clear();
  activeTags.add(t);
  goHome();
}

function goHome(push=true) {
  curPage = 1;
  if (push) history.pushState(null, '', location.pathname + location.search);
  document.getElementById('view-entry').style.display = 'none';
  render();
}

// ── HASH ROUTING ──────────────────────────────────────────────────────────────
function handleHash() {
  const h = location.hash.slice(1);
  if (h.startsWith('entry/')) {
    const id = h.slice(6);
    const e  = DATA.find(x => x.id === id);
    if (e) {
      // Sync sidebar + cat bar to match this entry
      if (e.game_code !== curGame) {
        curGame = e.game_code;
        document.body.setAttribute('data-game', curGame);
        document.querySelectorAll('.si[data-game]').forEach(n =>
          n.classList.toggle('on', n.dataset.game === curGame)
        );
        buildCatBar(curGame);
      }
      curCat = e.category;
      openEntry(id, false);
    } else {
      goHome(false);
    }
  } else {
    goHome(false);
  }
}

window.addEventListener('hashchange', handleHash);
window.addEventListener('popstate', handleHash);

// ── BOOT ──────────────────────────────────────────────────────────────────────
loadData();
</script>
</body>
</html>
